<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelle Cafe | Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* CSS SAMA SEPERTI SEBELUMNYA */
        :root { --bg-color: #fdfbf7; --accent-green: #d1e8d5; --text-color: #5a4b3c; --border-color: #a49688; }
        body { background: linear-gradient(135deg, var(--bg-color) 0%, #e9ece4 100%); font-family: 'Jost', sans-serif; color: var(--text-color); overflow: hidden; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .card-custom { background-color: var(--accent-green); border: 1px solid var(--border-color); border-radius: 25px; box-shadow: 0 15px 35px rgba(90, 75, 60, 0.15); animation: fadeUp 0.8s ease-out forwards, float 4s ease-in-out infinite alternate; animation-delay: 0s, 0.8s; position: relative; z-index: 10; }
        .form-control-custom { background-color: rgba(255, 255, 255, 0.8); border: 2px solid transparent; border-radius: 50px; color: var(--text-color); text-align: center; transition: all 0.3s; }
        .form-control-custom:focus { box-shadow: 0 0 15px rgba(255,255,255,0.8); border-color: var(--text-color); background-color: #fff; transform: scale(1.02); }
        .btn-outline-custom { background-color: transparent; border: 2px solid var(--text-color); color: var(--text-color); border-radius: 50px; font-weight: 600; letter-spacing: 1px; transition: all 0.3s ease; }
        .btn-outline-custom:hover { background-color: var(--text-color); color: #ffffff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(90, 75, 60, 0.2); }
        .leaf-decor { position: absolute; font-size: 80px; color: rgba(164, 150, 136, 0.1); z-index: 1; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100 position-relative">
    
    <i class="bi bi-flower1 leaf-decor" style="top: 10%; left: 10%;"></i>
    <i class="bi bi-flower3 leaf-decor" style="bottom: 10%; right: 10%; font-size: 120px;"></i>

    <div class="card card-custom p-5" style="width: 26rem;">
        <div class="text-center mb-4">
            <h2 class="mb-1" style="font-weight: 500; letter-spacing: 5px;">PASTELLE</h2>
            <p class="small text-muted mt-0" style="letter-spacing: 2px;"><i class="bi bi-stars"></i> ARTISAN BAKERY <i class="bi bi-stars"></i></p>
        </div>
        
        <form method="POST" action="/" id="loginForm">
            <div class="mb-4">
                <input type="text" name="nama" id="namaInput" class="form-control form-control-lg form-control-custom py-2 shadow-sm" placeholder="Siapa nama Anda?" required autocomplete="off">
            </div>
            
            <!-- DUA FITUR UTAMA WEB -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <button type="submit" name="action" value="order" class="btn btn-outline-custom w-100 py-2 d-flex flex-column align-items-center gap-1">
                        <i class="bi bi-cup-hot fs-5"></i>
                        <span style="font-size: 12px;">PESAN MENU</span>
                    </button>
                </div>
                <div class="col-6">
                    <button type="submit" name="action" value="reservasi" class="btn btn-outline-custom w-100 py-2 d-flex flex-column align-items-center gap-1">
                        <i class="bi bi-calendar-check fs-5"></i>
                        <span style="font-size: 12px;">RESERVASI</span>
                    </button>
                </div>
            </div>
        </form>

        <div class="text-center mt-2 border-top pt-3" style="border-color: rgba(164, 150, 136, 0.2) !important;">
            <a href="/daftar_reservasi" class="text-muted small" style="text-decoration: none; font-weight: 500;">
                <i class="bi bi-journal-text"></i> Lihat Daftar Reservasi (Admin)
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const input = document.getElementById('namaInput').value.trim();
            if(input.length === 0) {
                e.preventDefault(); 
                alert('Tolong masukkan nama yang valid ya!');
            }
        });
    </script>
</body>
</html>
