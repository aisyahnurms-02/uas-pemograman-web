<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelle Cafe | Form Reservasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Sama seperti edit_reservasi.html */
        :root { --bg-color: #fdfbf7; --accent-green: #d1e8d5; --text-color: #5a4b3c; --border-color: #a49688; }
        body { background: linear-gradient(135deg, var(--bg-color) 0%, #e9ece4 100%); font-family: 'Jost', sans-serif; color: var(--text-color); }
        .card-custom { background-color: var(--accent-green); border: 1px solid var(--border-color); border-radius: 25px; box-shadow: 0 15px 35px rgba(90, 75, 60, 0.15); }
        .form-control-custom { border-radius: 15px; border: 1px solid var(--border-color); }
        .btn-outline-custom { border: 2px solid var(--text-color); color: var(--text-color); border-radius: 50px; font-weight: 600; }
        .btn-outline-custom:hover { background-color: var(--text-color); color: #ffffff; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card card-custom p-5" style="width: 30rem;">
        <div class="text-center mb-4">
            <h2 style="letter-spacing: 3px;">RESERVASI</h2>
            <p class="small text-muted mt-2">Pesan meja & menu favoritmu di Pastelle</p>
        </div>
        <form method="POST" action="/reservasi">
            <div class="mb-3">
                <!-- Value otomatis terisi dari halaman login sebelumnya -->
                <input type="text" name="nama_pelanggan" class="form-control form-control-custom py-2" value="{{ nama_default }}" required>
            </div>
            <div class="mb-3">
                <input type="datetime-local" name="tanggal_reservasi" class="form-control form-control-custom py-2" required>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <input type="number" name="jumlah_orang" class="form-control form-control-custom py-2" placeholder="Jumlah Orang" min="1" required>
                </div>
                <div class="col-6">
                    <select name="no_meja" class="form-control form-control-custom py-2" required>
                        <option value="" disabled selected>Pilih Meja</option>
                        <option value="Meja 1 (Indoor)">Meja 1 (Indoor)</option>
                        <option value="Meja 2 (Outdoor)">Meja 2 (Outdoor)</option>
                        <option value="Meja VIP">Meja VIP</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <textarea name="pesanan" class="form-control form-control-custom py-2" rows="3" placeholder="Tulis pesanan awalmu di sini (Opsional)..."></textarea>
            </div>
            <button type="submit" class="btn btn-outline-custom w-100 py-2 mb-2">SIMPAN RESERVASI</button>
            <a href="/" class="btn btn-link text-muted w-100" style="text-decoration: none;">Batal & Kembali ke Awal</a>
        </form>
    </div>
</body>
</html>
