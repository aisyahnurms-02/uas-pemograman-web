<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pastelle Cafe | Edit Reservasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fdfbf7; --accent-green: #d1e8d5; --text-color: #5a4b3c; --border-color: #a49688; }
        body { background: linear-gradient(135deg, var(--bg-color) 0%, #e9ece4 100%); font-family: 'Jost', sans-serif; color: var(--text-color); }
        .card-custom { background-color: var(--accent-green); border: 1px solid var(--border-color); border-radius: 25px; box-shadow: 0 15px 35px rgba(90, 75, 60, 0.15); }
        .form-control-custom { border-radius: 15px; border: 1px solid var(--border-color); }
        .btn-outline-custom { border: 2px solid var(--text-color); color: var(--text-color); border-radius: 50px; font-weight: 600; }
        .btn-outline-custom:hover { background-color: var(--text-color); color: #ffffff; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card card-custom p-5" style="width: 30rem;">
        <div class="text-center mb-4">
            <h2 style="letter-spacing: 3px;">UPDATE DATA</h2>
            <p class="small text-muted mt-2">Edit reservasi #{{ data.id }}</p>
        </div>
        <form method="POST" action="/edit_reservasi/{{ data.id }}">
            <div class="mb-3">
                <input type="text" name="nama_pelanggan" class="form-control form-control-custom py-2" value="{{ data.nama_pelanggan }}" required>
            </div>
            <div class="mb-3">
                <!-- Memformat data datetime dari MySQL agar bisa terbaca oleh input HTML -->
                <input type="datetime-local" name="tanggal_reservasi" class="form-control form-control-custom py-2" value="{{ data.tanggal_reservasi|string|replace(' ', 'T') }}" required>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <input type="number" name="jumlah_orang" class="form-control form-control-custom py-2" value="{{ data.jumlah_orang }}" min="1" required>
                </div>
                <div class="col-6">
                    <select name="no_meja" class="form-control form-control-custom py-2" required>
                        <option value="Meja 1 (Indoor)" {% if data.no_meja == 'Meja 1 (Indoor)' %}selected{% endif %}>Meja 1 (Indoor)</option>
                        <option value="Meja 2 (Outdoor)" {% if data.no_meja == 'Meja 2 (Outdoor)' %}selected{% endif %}>Meja 2 (Outdoor)</option>
                        <option value="Meja VIP" {% if data.no_meja == 'Meja VIP' %}selected{% endif %}>Meja VIP</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <textarea name="pesanan" class="form-control form-control-custom py-2" rows="3">{{ data.pesanan }}</textarea>
            </div>
            <button type="submit" class="btn btn-outline-custom w-100 py-2">SIMPAN PERUBAHAN</button>
            <a href="/daftar_reservasi" class="btn btn-link text-muted w-100 mt-2" style="text-decoration: none;">Batal</a>
        </form>
    </div>
</body>
</html>
